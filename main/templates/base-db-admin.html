{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Admin Dashboard{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style-admin.css' %}">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    body.lightmode {
      background-color: #fdf6f0;
      color: #222;
    }

    body.lightmode .sidebar {
      background-color: #fff;
      border-right: 1px solid #ddd;
    }

    body.lightmode .sidebar a {
      color: #222;
    }

    body.lightmode .sidebar a:hover {
      background: #f0f0f0;
    }

    body.lightmode .main-content {
      background-color: #fff;
      color: #000;
    }
  </style>
</head>
<body>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <i class="fa-solid fa-user-tie"></i>
    <span>Admin</span>
  </div>

  <a href="{% url 'admin_dashboard' %}"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a>
  <a href="{% url 'order_list' %}"><i class="fas fa-list"></i> <span>Orders</span></a>
  <a href="{% url 'add_category' %}"><i class="fas fa-tags"></i> <span>Category</span></a>
  <a href="{% url 'add_brand' %}"><i class="fas fa-briefcase"></i> <span>Brand</span></a>
  <a href="{% url 'product_list' %}"><i class="fas fa-box"></i> <span>Product</span></a>
  <a href="{% url 'feedback' %}"><i class="fas fa-comment-dots"></i> <span>Feedback</span></a>
<a href="{% url 'revenue_list' %}"><i class="fas fa-list-alt"></i> Revenue Report</a>
  <!-- Revenue Dropdown -->
  {% comment %} <div class="dropdown">
    <a href="#" class="dropdown-toggle" onclick="toggleDropdown('revenueDropdown')">
      <i class="fas fa-rupee-sign"></i> <span>Revenue</span>
    </a>
    <div id="revenueDropdown" class="dropdown-menu">
      
      <a href="{% url 'monthly_revenue' %}"><i class="fas fa-calendar-alt"></i> Monthly Revenue</a>
    </div>
  </div> {% endcomment %}

  <a href="{% url 'changepwd_admin' %}"><i class="fas fa-key"></i> <span>Change Password</span></a>
  <a href="{% url 'logout_user' %}"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></a>

  <!-- Theme Toggle -->
  <a href="javascript:void(0);" onclick="toggleTheme()" class="theme-toggle-link">
    <i class="fas fa-moon"></i> <span>Toggle Theme</span>
  </a>
</div>

<!-- Sidebar Toggle Button -->
<button class="toggle-sidebar-btn" onclick="toggleSidebar()">☰</button>

<!-- Main Content -->
<div class="main-content" id="mainContent">
  {% block main %}
  {% endblock %}
</div>

<!-- JS -->
<script>
  function toggleSidebar() {
    const sidebar = document.getElementById('sidebar');
    const mainContent = document.getElementById('mainContent');
    sidebar.classList.toggle('collapsed');
    mainContent.classList.toggle('full');
  }

  function toggleTheme() {
    document.body.classList.toggle('lightmode');
    localStorage.setItem('theme', document.body.classList.contains('lightmode') ? 'light' : 'dark');
  }

  function toggleDropdown(id) {
    const dropdown = document.getElementById(id);
    dropdown.style.display = dropdown.style.display === 'flex' ? 'none' : 'flex';
    dropdown.previousElementSibling.classList.toggle('open');
  }

  document.addEventListener("DOMContentLoaded", () => {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      document.body.classList.add('lightmode');
    }
  });
</script>

</body>
</html>
