{% extends 'base.html' %}
{% block title %}Profile - Radhika Electronics{% endblock %}

{% block content %}
<div class="card mx-auto" style="max-width: 600px;">
  <div class="card-body">
    <h3 class="card-title mb-4">👤 Profile</h3>
    <p><strong>Username:</strong> {{ profile.user.username }}</p>
    <p><strong>Email:</strong> {{ profile.user.email }}</p>
    <p><strong>Mobile:</strong> {{ profile.mobile }}</p>
    <p><strong>Address:</strong> {{ profile.address }}</p>
    <a href="{% url 'user_dashboard' %}" class="btn btn-primary mt-3">Go to Dashboard</a>
    <div class="mt-4 text-end">
      <a href="{% url 'changepwd_admin' %}" class="btn btn-outline-light">Change Password</a>
    </div>
  </div>
</div>
{% endblock %}
