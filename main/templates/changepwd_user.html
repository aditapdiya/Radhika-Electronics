{% extends 'base.html' %}
{% block title %}Change Password | Radhika Electronics{% endblock %}

{% block content %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-6 col-md-8">
      <div class="card shadow-sm">
        <div class="card-header bg-gradient text-white d-flex align-items-center" style="background: linear-gradient(90deg, #0071ff, #0045a5);">
          <i class="fas fa-key me-2"></i>
          <h5 class="mb-0">Change Password</h5>
        </div>
        <div class="card-body">
          <form method="POST" novalidate>
            {% csrf_token %}
            {% for field in form %}
              <div class="mb-3">
                <label class="form-label">{{ field.label }}</label>
                {{ field }}
                {% if field.errors %}
                  <div class="text-danger small mt-1">{{ field.errors.0 }}</div>
                {% endif %}
              </div>
            {% endfor %}
            <div class="d-grid mt-4">
              <button type="submit" class="btn btn-primary">
                <i class="fas fa-lock me-1"></i> Update Password
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
